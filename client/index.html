<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Drop maximum-scale=1: it blocks user-initiated pinch-zoom on mobile,
         which violates WCAG 1.4.4 (text resize up to 200%) and is a common
         a11y-audit failure. iOS/Android still respect initial-scale=1 for
         the default render; users can zoom past it when they need to. -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Prescient Labs gives manufacturers the foresight to make smarter decisions - from predicting demand and timing purchases to optimizing production and protecting supply chains." />
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="robots" content="index,follow" />
    <title>Prescient Labs - Manufacturing Intelligence Platform</title>
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="canonical" href="https://prescient-labs.com/" />

    <!-- Open Graph (LinkedIn, Slack, Facebook) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Prescient Labs" />
    <meta property="og:title" content="Prescient Labs — Manufacturing Intelligence Platform" />
    <meta property="og:description" content="Unify demand, supply, commodities, and production into a single operational system. Built for operators running the physical economy." />
    <meta property="og:url" content="https://prescient-labs.com/" />
    <meta property="og:image" content="https://prescient-labs.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Prescient Labs — Manufacturing intelligence for mid-market operators" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Prescient Labs — Manufacturing Intelligence Platform" />
    <meta name="twitter:description" content="Unify demand, supply, commodities, and production into a single operational system. Built for operators running the physical economy." />
    <meta name="twitter:image" content="https://prescient-labs.com/og-image.png" />

    <!-- JSON-LD organization schema for Google -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Prescient Labs",
        "description": "Manufacturing intelligence platform unifying demand, supply, commodities, and production for mid-market operators.",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "Web",
        "url": "https://prescient-labs.com/",
        "offers": {
          "@type": "Offer",
          "price": "299",
          "priceCurrency": "USD"
        },
        "publisher": {
          "@type": "Organization",
          "name": "Prescient Labs",
          "url": "https://prescient-labs.com/"
        }
      }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Only Inter (sans) and JetBrains Mono (mono) are referenced anywhere
         in the codebase — see --font-sans / --font-mono in client/src/index.css
         and grep verified zero usages of the other 23 families that used to
         live in this preload. Trimmed to two so the Google Fonts CSS request
         is small, fewer subset stylesheets get downloaded, and FCP is no
         longer paying for fonts the app never renders. -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=JetBrains+Mono:ital,wght@0,100..800;1,100..800&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script src="https://js.stripe.com/v3/"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
