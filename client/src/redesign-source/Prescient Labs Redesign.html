<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Prescient Labs · App Redesign</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="stylesheet" href="tokens.css" />
<style>
  html, body { background: #050608; color: #F2F2F2; margin: 0; padding: 0; min-height: 100%; }
  body { font-family: 'Inter', system-ui, sans-serif; }
  .frame {
    width: 100%; height: 100%;
    background: var(--ink);
    border: 1px solid var(--line);
    overflow: hidden;
  }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/d3@7.9.0/dist/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/topojson-client@3.1.0/dist/topojson-client.min.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="shell.jsx"></script>

<script type="text/babel" src="dashboard.jsx"></script>
<script type="text/babel" src="procurement.jsx"></script>
<script type="text/babel" src="advisor.jsx"></script>

<script type="text/babel" src="batch1-overview.jsx"></script>
<script type="text/babel" src="batch2-intelligence.jsx"></script>
<script type="text/babel" src="batch3-forecasting.jsx"></script>
<script type="text/babel" src="batch4-procurement.jsx"></script>
<script type="text/babel" src="batch5a-suppliers.jsx"></script>
<script type="text/babel" src="batch5b-ops.jsx"></script>
<script type="text/babel" src="batch6-agents.jsx"></script>
<script type="text/babel" src="batch7-misc.jsx"></script>

<script type="text/babel" src="tweaks.jsx"></script>

<script type="text/babel" data-presets="react">
// DCSection only walks DIRECT DCArtboard children, so we inline them via a helper
// that returns the children array (not a component).
const W = 1440;
const H = 1080;
const HSm = 900;

const F = (label, Page, h = H, w = W) => (
  <window.DCArtboard
    key={label}
    id={label.toLowerCase().replace(/[^a-z0-9]+/g, '-')}
    label={label} width={w} height={h}>
    <div className="frame" data-screen-label={label}><Page /></div>
  </window.DCArtboard>
);

function App() {
  return (
    <window.DesignCanvas
      title="Prescient Labs · App Redesign"
      subtitle="42 surfaces · dashboard, intelligence, forecasting, procurement, suppliers, agents, settings, public — Apr 26, 2026">

      <window.DCSection id="primary" title="01 · Primary surfaces">
        {F("01 Dashboard", window.DashboardPage)}
        {F("02 Procurement", window.ProcurementPage)}
        {F("03 AI Advisor", window.AdvisorPage, HSm)}
      </window.DCSection>

      <window.DCSection id="overview" title="02 · Overview hubs">
        {F("04 Dashboard Hub", window.DashboardHubPage)}
        {F("05 Pilot Revenue Dashboard", window.PilotRevenueDashboardPage)}
        {F("06 Impact Dashboard", window.ImpactDashboardPage)}
        {F("07 Operations Hub", window.OperationsHubPage)}
        {F("08 Demand Hub", window.DemandHubPage)}
      </window.DCSection>

      <window.DCSection id="intelligence" title="03 · Intelligence">
        {F("09 Strategy Hub", window.StrategyHubPage)}
        {F("10 Strategy Insights", window.StrategyInsightsPage)}
        {F("11 Strategic Analysis", window.StrategicAnalysisPage)}
        {F("12 Event Monitoring", window.EventMonitoringPage)}
        {F("13 Demand Signal Repository", window.DemandSignalRepositoryPage)}
        {F("14 M&A Intelligence", window.MAIntelligencePage)}
        {F("15 Geopolitical Risk", window.GeopoliticalRiskPage)}
        {F("16 Industry Consortium", window.IndustryConsortiumPage)}
        {F("17 Peer Benchmarking", window.PeerBenchmarkingPage)}
      </window.DCSection>

      <window.DCSection id="forecasting" title="04 · Demand & forecasting">
        {F("18 Forecasting · single SKU", window.ForecastingPage)}
        {F("19 Multi-Horizon", window.MultiHorizonPage)}
        {F("20 Forecast Accuracy", window.ForecastAccuracyPage)}
        {F("21 Commodity Forecasting", window.CommodityForecastingPage)}
        {F("22 Backtesting Dashboard", window.BacktestingDashboardPage)}
        {F("23 Forecast Ensemble", window.ForecastEnsemblePage)}
      </window.DCSection>

      <window.DCSection id="procurement" title="05 · Procurement cluster">
        {F("24 Procurement Hub", window.ProcurementHubPage)}
        {F("25 Automated PO", window.AutomatedPOPage)}
        {F("26 Allocation", window.AllocationPage)}
        {F("27 Inventory Management", window.InventoryManagementPage)}
        {F("28 Inventory Optimization", window.InventoryOptimizationPage)}
        {F("29 RFQ Dashboard", window.RFQDashboardPage)}
      </window.DCSection>

      <window.DCSection id="suppliers" title="06 · Suppliers & supply chain">
        {F("30 Supply Chain Hub", window.SupplyChainHubPage)}
        {F("31 Multi-Tier Supplier Mapping", window.MultiTierSupplierMappingPage)}
        {F("32 Supplier Directory", window.SupplyChainPage)}
        {F("33 Supplier Risk", window.SupplierRiskPage)}
        {F("34 Supply Chain Network", window.SupplyChainNetworkPage)}
        {F("35 Traceability", window.SupplyChainTraceabilityPage)}
      </window.DCSection>

      <window.DCSection id="ops" title="07 · Operations & logistics">
        {F("36 Logistics Management", window.LogisticsManagementPage)}
        {F("37 Trade & Tariffs", window.TradeTariffsPage)}
        {F("38 Global Events", window.GlobalEventsPage)}
        {F("39 Event Calendar", window.EventCalendarPage)}
        {F("40 Process Automation", window.ProcessAutomationPage)}
      </window.DCSection>

      <window.DCSection id="agents" title="08 · Agents">
        {F("41 Agent Monitoring", window.AgentMonitoringPage)}
        {F("42 Agent Registry", window.AgentRegistryPage)}
        {F("43 Swarm Orchestration", window.SwarmOrchestrationPage)}
      </window.DCSection>

      <window.DCSection id="scenarios" title="09 · Scenarios">
        {F("44 Scenario Builder", window.ScenarioBuilderPage)}
        {F("45 Scenario Compare", window.ScenarioComparePage)}
      </window.DCSection>

      <window.DCSection id="settings" title="10 · Settings & trust">
        {F("46 Profile", window.SettingsProfilePage)}
        {F("47 Team", window.TeamPage)}
        {F("48 Workspace", window.WorkspacePage)}
        {F("49 Notifications", window.NotificationsPage)}
        {F("50 Integrations", window.IntegrationsPage)}
        {F("51 Security", window.SecurityPage)}
        {F("52 Data & Residency", window.DataResidencyPage)}
        {F("53 Trust Center", window.TrustCenterPage)}
      </window.DCSection>

      <window.DCSection id="auth" title="11 · Auth & onboarding">
        {F("54 Sign in", window.SignInPage, HSm)}
        {F("55 Sign up", window.SignUpPage, HSm)}
        {F("56 SSO callback", window.SSOCallbackPage, HSm)}
        {F("57 Onboarding · connect", window.OnboardingConnect1Page, HSm)}
        {F("58 Onboarding · feeds", window.OnboardingConnect2Page, HSm)}
        {F("59 Onboarding · ready", window.OnboardingReadyPage, HSm)}
      </window.DCSection>

      <window.DCSection id="admin" title="12 · Admin">
        {F("60 Tenants", window.AdminTenantsPage)}
        {F("61 Users", window.AdminUsersPage)}
        {F("62 Audit log", window.AdminAuditPage)}
        {F("63 Feature flags", window.AdminFlagsPage)}
        {F("64 Billing", window.BillingPage)}
      </window.DCSection>

      <window.DCSection id="public" title="13 · Public / marketing">
        {F("65 Landing", window.MarketingLandingPage, HSm)}
        {F("66 Pricing", window.MarketingPricingPage, HSm)}
        {F("67 Security", window.MarketingSecurityPage, HSm)}
        {F("68 Careers", window.MarketingCareersPage, HSm)}
      </window.DCSection>

    </window.DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
