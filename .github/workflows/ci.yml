# Continuous integration — typecheck + build on every PR and every push to
# main. Keeps the meta-routine honest: if a nightly routine opens a PR that
# doesn't compile, this workflow will mark it red and the PR stays in draft
# until a human fixes it.

name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck + build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npm run check

      - name: Build (client + server)
        run: npm run build
        env:
          # Build-time only — not needed at runtime here, but Vite will
          # complain about missing env vars if they're referenced.
          NODE_ENV: production
