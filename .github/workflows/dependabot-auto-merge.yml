# Auto-merge Dependabot PRs for non-breaking updates.
#
# Behavior:
#   - Patch updates (0.0.X)     → enable auto-merge (merges after CI)
#   - Minor updates (0.X.0)     → enable auto-merge (merges after CI)
#   - Major updates (X.0.0)     → leave alone; you review manually
#   - Security updates          → always auto-merge if CI passes
#
# Prerequisite:
#   - GitHub → Settings → General → Allow auto-merge: ON
#   - Branch protection on main requires the `ci / typecheck + build`
#     status check (see .github/SETUP.md step 4)
#
# If CI fails on a Dependabot PR, auto-merge won't trigger. You'll get
# the red check in your inbox and can decide how to handle it.

name: dependabot-auto-merge

on:
  pull_request:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Fetch Dependabot metadata
        id: meta
        uses: dependabot/fetch-metadata@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge for patch + minor + security updates
        if: |
          steps.meta.outputs.update-type == 'version-update:semver-patch' ||
          steps.meta.outputs.update-type == 'version-update:semver-minor' ||
          steps.meta.outputs.dependency-type == 'direct:development' ||
          contains(steps.meta.outputs.dependency-name, 'security')
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
